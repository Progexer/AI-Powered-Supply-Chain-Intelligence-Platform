version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: supplychainiq-backend
    ports:
      - "8000:8000"
    environment:
      - API_ENV=production
      - API_PORT=8000
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: supplychainiq-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
